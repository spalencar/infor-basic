<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adicionar Senha ao Usuário</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        color: #e2e8f0;
      }

      .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 500px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .logo {
        width: 60px;
        height: 60px;
        background: linear-gradient(45deg, #ff6b6b, #feca57);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        color: white;
        margin: 0 auto 20px;
      }

      h1 {
        color: #feca57;
        text-align: center;
        margin-bottom: 10px;
        font-size: 1.8em;
      }

      .description {
        color: #cbd5e1;
        text-align: center;
        margin-bottom: 30px;
        font-size: 0.9em;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #cbd5e1;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
        font-size: 14px;
      }

      .form-group input::placeholder {
        color: #94a3b8;
      }

      .form-group input:focus {
        outline: none;
        border-color: #feca57;
        background: rgba(255, 255, 255, 0.15);
      }

      .info-box {
        background: rgba(56, 189, 248, 0.1);
        border: 1px solid rgba(56, 189, 248, 0.3);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 25px;
        font-size: 0.85em;
        line-height: 1.5;
        color: #cbd5e1;
      }

      .info-box strong {
        color: #38bdf8;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 30px;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      .btn-submit {
        background: linear-gradient(45deg, #ff6b6b, #feca57);
        color: black;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
      }

      .btn-submit:disabled {
        background: #6b7280;
        cursor: not-allowed;
        transform: none;
      }

      .btn-reset {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .btn-reset:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        display: none;
        text-align: center;
      }

      .result.success {
        background: rgba(81, 207, 102, 0.2);
        border: 1px solid rgba(81, 207, 102, 0.3);
        color: #51cf66;
      }

      .result.error {
        background: rgba(248, 113, 113, 0.2);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: #f87171;
      }

      .loading {
        display: none;
        text-align: center;
        color: #feca57;
      }

      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 202, 87, 0.3);
        border-radius: 50%;
        border-top-color: #feca57;
        animation: spin 0.8s linear infinite;
        margin-right: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">M+</div>
      <h1>Adicionar Senha ao Usuário</h1>
      <p class="description">
        Configure a senha de desbloqueio para um usuário específico
      </p>

      <div class="info-box">
        <strong>ℹ️ Como funciona:</strong><br />
        Esta ferramenta adicionará uma senha de desbloqueio ao usuário. Esta
        senha será usada para desbloquear botões administrativos por 30
        minutos.
      </div>

      <form id="password-form">
        <div class="form-group">
          <label for="email">E-mail do Usuário:</label>
          <input
            type="email"
            id="email"
            required
            placeholder="usuario@email.com"
          />
        </div>

        <div class="form-group">
          <label for="currentPassword">Senha Atual (para login):</label>
          <input
            type="password"
            id="currentPassword"
            required
            placeholder="Senha usada no login"
          />
        </div>

        <div class="form-group">
          <label for="unlockPassword">Nova Senha de Desbloqueio:</label>
          <input
            type="password"
            id="unlockPassword"
            required
            placeholder="Senha para desbloquear botões"
            minlength="6"
          />
        </div>

        <div class="loading" id="loading">
          <span class="spinner"></span>Processando...
        </div>

        <div class="button-group">
          <button type="submit" class="btn-submit" id="submitBtn">
            Adicionar Senha
          </button>
          <button type="reset" class="btn-reset">Limpar</button>
        </div>
      </form>

      <div class="result" id="result"></div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        signOut,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        updateDoc,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyB60LaJaxphLZvb2c0T3t8T9DYTPgTXFL0",
        authDomain: "infor-basic.firebaseapp.com",
        projectId: "infor-basic",
        storageBucket: "infor-basic.firebasestorage.app",
        messagingSenderId: "152738530319",
        appId: "1:152738530319:web:0c9644a18c6e340b2c8f7a",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const form = document.getElementById("password-form");
      const loading = document.getElementById("loading");
      const result = document.getElementById("result");
      const submitBtn = document.getElementById("submitBtn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const currentPassword = document.getElementById("currentPassword").value;
        const unlockPassword = document.getElementById("unlockPassword").value;

        // Validações
        if (!email || !currentPassword || !unlockPassword) {
          showResult("⚠️ Preencha todos os campos!", "error");
          return;
        }

        if (unlockPassword.length < 6) {
          showResult(
            "⚠️ A senha de desbloqueio deve ter pelo menos 6 caracteres!",
            "error",
          );
          return;
        }

        loading.style.display = "block";
        submitBtn.disabled = true;
        result.style.display = "none";

        try {
          console.log("Fazendo login...");

          // Fazer login com as credenciais do usuário
          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            currentPassword,
          );
          const user = userCredential.user;

          console.log("Login realizado. UID:", user.uid);

          // Atualizar o documento do usuário com a senha de desbloqueio
          const userRef = doc(db, "users", user.uid);
          await updateDoc(userRef, {
            unlockPassword: unlockPassword,
            updatedAt: new Date(),
          });

          console.log("✅ Senha de desbloqueio adicionada com sucesso!");

          // Logout
          await signOut(auth);
          console.log("Logout realizado.");

          showResult(
            "✅ Senha adicionada com sucesso! O usuário poderá agora desbloquear os botões com esta senha.",
            "success",
          );
          form.reset();
        } catch (error) {
          console.error("❌ Erro:", error);
          console.error("Código do erro:", error.code);
          console.error("Mensagem:", error.message);

          let errorMessage = "Erro ao adicionar senha. ";

          switch (error.code) {
            case "auth/invalid-email":
              errorMessage += "E-mail inválido.";
              break;
            case "auth/user-not-found":
              errorMessage += "Usuário não encontrado com este e-mail.";
              break;
            case "auth/wrong-password":
              errorMessage += "Senha incorreta.";
              break;
            case "auth/too-many-requests":
              errorMessage += "Muitas tentativas de login. Tente novamente mais tarde.";
              break;
            default:
              errorMessage += error.message;
          }

          showResult(errorMessage, "error");
        } finally {
          loading.style.display = "none";
          submitBtn.disabled = false;
        }
      });

      function showResult(message, type) {
        result.textContent = message;
        result.className = `result ${type}`;
        result.style.display = "block";
      }
    </script>
  </body>
</html>

      }

      // Executar a função
      addUnlockPassword();
    </script>
  </body>
</html>
