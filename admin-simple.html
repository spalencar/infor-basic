<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Simples - Teste Firestore</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e2e8f0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { color: #feca57; text-align: center; margin-bottom: 30px; }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: bold;
        }
        .success { 
            background: rgba(81, 207, 102, 0.2); 
            color: #51cf66; 
            border: 1px solid rgba(81, 207, 102, 0.3);
        }
        .error { 
            background: rgba(255, 107, 107, 0.2); 
            color: #ff6b6b; 
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        .info { 
            background: rgba(52, 152, 219, 0.2); 
            color: #3498db; 
            border: 1px solid rgba(52, 152, 219, 0.3);
        }
        button {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: bold;
        }
        #console {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #feca57;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .users-table th,
        .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .users-table th {
            background: rgba(255, 255, 255, 0.05);
            color: #feca57;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>?? Dashboard Simples - Teste Firestore</h1>
        
        <div id="status" class="status info">Inicializando...</div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-users">0</div>
                <div>Total de Usuários</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="active-users">0</div>
                <div>Usuários Ativos</div>
            </div>
        </div>
        
        <button onclick="testConnection()">Testar Conexão</button>
        <button onclick="loadUsers()">Carregar Usuários</button>
        <button onclick="createTestUser()">Criar Usuário Teste</button>
        <button onclick="clearConsole()">Limpar Console</button>
        
        <div id="users-container">
            <h3>Usuários Encontrados:</h3>
            <table class="users-table" id="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Tipo</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 20px;">
                            Nenhum usuário carregado
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div id="console"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB60LaJaxphLZvb2c0T3t8T9DYTPgTXFL0",
            authDomain: "infor-basic.firebaseapp.com",
            projectId: "infor-basic",
            storageBucket: "infor-basic.firebasestorage.app",
            messagingSenderId: "152738530319",
            appId: "1:152738530319:web:0c9644a18c6e340b2c8f7a",
        };

        let app, db, auth;
        let allUsers = [];

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const consoleDiv = document.getElementById('console');
            const logMessage = `[${timestamp}] ${type.toUpperCase()}: ${message}`;
            
            consoleDiv.textContent += logMessage + '\n';
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            
            console.log(logMessage);
        }

        function updateStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function updateStats() {
            const totalUsers = allUsers.length;
            const activeUsers = allUsers.filter(u => u.status === 'active').length;
            
            document.getElementById('total-users').textContent = totalUsers;
            document.getElementById('active-users').textContent = activeUsers;
            
            log(`Estatísticas atualizadas: ${totalUsers} total, ${activeUsers} ativos`);
        }

        function displayUsers() {
            const tbody = document.getElementById('users-tbody');
            
            if (allUsers.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 20px;">
                            Nenhum usuário encontrado
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = '';
            
            allUsers.forEach(user => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.name || 'N/A'}</td>
                    <td>${user.email || 'N/A'}</td>
                    <td>${user.userType || 'N/A'}</td>
                    <td>${user.status || 'N/A'}</td>
                `;
            });
            
            log(`${allUsers.length} usuários exibidos na tabela`);
        }

        window.testConnection = async function() {
            log('=== Testando Conexão Firebase ===');
            
            try {
                // Inicializar Firebase
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                
                log('Firebase inicializado com sucesso', 'success');
                
                // Autenticar anonimamente
                const userCredential = await signInAnonymously(auth);
                log(`Autenticação anônima: ${userCredential.user.uid}`, 'success');
                
                // Testar conexão com Firestore
                const testCollection = collection(db, '_test');
                const snapshot = await getDocs(testCollection);
                
                log('Conexão Firestore bem-sucedida', 'success');
                updateStatus('Conectado ao Firestore', 'success');
                
            } catch (error) {
                log(`Erro na conexão: ${error.message}`, 'error');
                log(`Código: ${error.code}`);
                updateStatus('Erro de conexão', 'error');
            }
        };

        window.loadUsers = async function() {
            log('=== Carregando Usuários ===');
            
            if (!db) {
                log('Firestore não inicializado', 'error');
                return;
            }
            
            try {
                const usersCollection = collection(db, 'users');
                const snapshot = await getDocs(usersCollection);
                
                log(`Query executada: ${snapshot.size} documentos encontrados`);
                
                allUsers = [];
                snapshot.forEach(doc => {
                    const userData = {
                        id: doc.id,
                        ...doc.data()
                    };
                    
                    // Ignorar documentos de teste
                    if (!userData.testDocument && !userData.diagnosticTest) {
                        allUsers.push(userData);
                        log(`Usuário carregado: ${userData.name} (${userData.email})`);
                    }
                });
                
                log(`Total de usuários válidos: ${allUsers.length}`, 'success');
                
                updateStats();
                displayUsers();
                
                if (allUsers.length > 0) {
                    updateStatus(`${allUsers.length} usuários carregados`, 'success');
                } else {
                    updateStatus('Nenhum usuário encontrado', 'error');
                }
                
            } catch (error) {
                log(`Erro ao carregar usuários: ${error.message}`, 'error');
                log(`Código: ${error.code}`);
                updateStatus('Erro ao carregar usuários', 'error');
            }
        };

        window.createTestUser = async function() {
            log('=== Criando Usuário Teste ===');
            
            if (!db) {
                log('Firestore não inicializado', 'error');
                return;
            }
            
            try {
                const usersCollection = collection(db, 'users');
                const testUser = {
                    name: 'Usuário Teste Simples',
                    email: 'teste@simples.com',
                    userType: 'pessoal',
                    status: 'active',
                    createdAt: new Date(),
                    simpleTest: true
                };
                
                const docRef = await addDoc(usersCollection, testUser);
                log(`Usuário teste criado: ${docRef.id}`, 'success');
                
                // Recarregar usuários
                loadUsers();
                
            } catch (error) {
                log(`Erro ao criar usuário: ${error.message}`, 'error');
            }
        };

        window.clearConsole = function() {
            document.getElementById('console').textContent = '';
        };

        // Inicialização automática
        log('Dashboard Simples carregado');
        log('Clique em "Testar Conexão" para começar');
    </script>
</body>
</html>
