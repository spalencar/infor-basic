<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curso de Informática Básica</title>
    <link rel="icon" type="image/svg+xml" href="imagens/favicon.svg">
    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

      // Configuração do Firebase (substitua pelas suas credenciais)
      const firebaseConfig = {
        apiKey: "AIzaSyB60LaJaxphLZvb2c0T3t8T9DYTPgTXFL0",
        authDomain: "infor-basic.firebaseapp.com",
        projectId: "infor-basic",
        storageBucket: "infor-basic.firebasestorage.app",
        messagingSenderId: "152738530319",
        appId: "1:152738530319:web:0c9644a18c6e340b2c8f7a",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      window.currentUser = null;
      window.domReady = false;
      window.pendingUser = null;
      window.userData = null;

      async function handleAuthStateChanged(user) {
        window.currentUser = user;

        if (!user) {
          window.location.href = "login.html";
          return;
        }

        await loadUserData();
        await loadLessonStatuses();
      }

      // Carregar dados do usuário do Firestore
      async function loadUserData() {
        if (!window.currentUser) return;

        try {
          const userDocRef = doc(db, "users", window.currentUser.uid);
          const userDoc = await getDoc(userDocRef);

          if (userDoc.exists()) {
            window.userData = userDoc.data();
            console.log("userData loaded:", window.userData);
            updateUserInfo();
          } else {
            console.log("userData not found in Firestore");
          }
        } catch (error) {
          console.error("Erro ao carregar dados do usuário:", error);
        }
      }

      window.lockedButtons = false;
      window.unlockExpiry = null;

      // Verificar se os botões devem estar bloqueados
      function shouldLockButtons() {
        if (!window.userData) return false;

        const userTypeKey = (
          window.userData.userType ||
          window.userData.planType ||
          ""
        )
          .toString()
          .trim()
          .toLowerCase();

        const isInstitutional =
          userTypeKey === "institucional" ||
          (!!window.userData.students &&
            Array.isArray(window.userData.students));

        return isInstitutional && !window.lockedButtons;
      }

      // Atualizar estado dos botões bloqueados
      function updateLockedButtons() {
        const lockButtons = shouldLockButtons();
        const studentsBtn = document.getElementById("students-btn");
        const homeBtn = document.getElementById("home-btn");
        const authButton = document.getElementById("auth-button");
        const unlockBtn = document.getElementById("unlock-btn");

        if (lockButtons) {
          // Bloquear botões
          if (studentsBtn) {
            studentsBtn.disabled = true;
            studentsBtn.style.opacity = "0.5";
            studentsBtn.style.cursor = "not-allowed";
          }
          if (homeBtn) {
            homeBtn.disabled = true;
            homeBtn.style.opacity = "0.5";
            homeBtn.style.cursor = "not-allowed";
          }
          if (authButton) {
            authButton.disabled = true;
            authButton.style.opacity = "0.5";
            authButton.style.cursor = "not-allowed";
          }
          if (unlockBtn) {
            unlockBtn.style.display = "inline-flex";
          }
        } else {
          // Desbloquear botões
          if (studentsBtn) {
            studentsBtn.disabled = false;
            studentsBtn.style.opacity = "1";
            studentsBtn.style.cursor = "pointer";
          }
          if (homeBtn) {
            homeBtn.disabled = false;
            homeBtn.style.opacity = "1";
            homeBtn.style.cursor = "pointer";
          }
          if (authButton) {
            authButton.disabled = false;
            authButton.style.opacity = "1";
            authButton.style.cursor = "pointer";
          }
          if (unlockBtn) {
            unlockBtn.style.display = "none";
          }
        }
      }

      // Desbloquear botões com senha
      window.unlockButtons = async function () {
        // Verificar se já está desbloqueado e não expirou
        if (window.unlockExpiry && Date.now() < window.unlockExpiry) {
          const remainingMinutes = Math.ceil(
            (window.unlockExpiry - Date.now()) / (60 * 1000),
          );
          alert(
            `Botões já estão desbloqueados! Tempo restante: ${remainingMinutes} minutos.`,
          );
          return;
        }

        const password = prompt("Digite SUA senha para desbloquear:");
        if (!password) return;

        try {
          // Verificar senha do usuário atual
          if (!window.currentUser || !window.userData) {
            alert("Erro: Usuário não identificado.");
            return;
          }

          // Buscar senha salva no Firestore
          let savedPassword = null;
          try {
            const userDocRef = doc(db, "users", window.currentUser.uid);
            const userDoc = await getDoc(userDocRef);
            if (userDoc.exists()) {
              savedPassword = userDoc.data().unlockPassword;
            }
          } catch (error) {
            console.error("Erro ao buscar senha:", error);
          }

          if (!savedPassword) {
            alert(
              "Senha não configurada. Entre em contato com o administrador.",
            );
            return;
          }

          // Verificar senha
          if (password === savedPassword) {
            window.lockedButtons = true;
            window.unlockExpiry = Date.now() + 30 * 60 * 1000; // 30 minutos
            updateLockedButtons();
            alert("Botões desbloqueados por 30 minutos!");

            // Auto-lock após expiração
            setTimeout(
              () => {
                if (Date.now() >= window.unlockExpiry) {
                  window.lockedButtons = false;
                  updateLockedButtons();
                  alert(
                    "Tempo de desbloqueio expirado. Botões bloqueados novamente.",
                  );
                }
              },
              30 * 60 * 1000,
            );
          } else {
            alert("Senha incorreta!");
          }
        } catch (error) {
          console.error("Erro ao verificar senha:", error);
          alert("Erro ao verificar senha. Tente novamente.");
        }
      };

      // Atualizar informações do usuário no header
      function updateUserInfo() {
        if (!window.userData) return;

        const userTypeKey = (
          window.userData.userType ||
          window.userData.planType ||
          ""
        )
          .toString()
          .trim()
          .toLowerCase();
        const isAdmin =
          userTypeKey === "admin" || window.userData.isAdmin === true;
        const isInstitutional =
          userTypeKey === "institucional" ||
          (!!window.userData.students &&
            Array.isArray(window.userData.students));

        const headerTitle = document.getElementById("header-title");
        const userInfo = document.getElementById("user-info");
        const userName = document.getElementById("user-name");
        const userType = document.getElementById("user-type");
        const studentsBtn = document.getElementById("students-btn");
        const adminBtn = document.getElementById("admin-btn");
        const authButton = document.getElementById("auth-button");

        if (headerTitle) {
          headerTitle.textContent = window.userData.name || "Usuário";
        }

        if (authButton) {
          authButton.textContent = "Logout";
          authButton.title = "Logout";
        }

        if (studentsBtn) {
          if (isInstitutional) {
            studentsBtn.style.removeProperty("display");
            studentsBtn.style.display = "inline-flex";
          } else {
            studentsBtn.style.display = "none";
          }
        }

        if (adminBtn) {
          if (isAdmin) {
            adminBtn.style.removeProperty("display");
            adminBtn.style.display = "inline-flex";
          } else {
            adminBtn.style.display = "none";
          }
        }

        if (userInfo && userName) {
          userName.textContent = window.userData.name || "Usuário";

          if (userType) {
            const userTypeText =
              userTypeKey === "pessoal"
                ? "Pessoal"
                : isInstitutional
                  ? "Institucional"
                  : isAdmin
                    ? "Administrador"
                    : "";
            userType.textContent = userTypeText;
          }

          const dashboardRoute =
            window.userData.dashboardPage ||
            (isAdmin
              ? "admin-dashboard.html"
              : isInstitutional
                ? "students-management.html"
                : "");
          window.dashboardRoute = dashboardRoute;

          console.log("updateUserInfo", {
            userTypeKey,
            isAdmin,
            isInstitutional,
            dashboardRoute,
            userTypeValue: window.userData.userType,
            userData: window.userData,
          });

          if (userInfo) {
            userInfo.style.display = "flex";
          }
        }

        // Aplicar bloqueio de botões após atualizar userInfo
        updateLockedButtons();
      }

      window.addEventListener("DOMContentLoaded", () => {
        window.domReady = true;
        if (window.pendingUser !== null) {
          handleAuthStateChanged(window.pendingUser);
          window.pendingUser = null;
        }
      });

      onAuthStateChanged(auth, (user) => {
        if (window.domReady) {
          handleAuthStateChanged(user);
        } else {
          window.pendingUser = user;
        }
      });

      function normalizeLessonStatusValue(value) {
        return (
          value === true || value === "true" || value === 1 || value === "1"
        );
      }

      function updateStatusButton(button, status) {
        const active = normalizeLessonStatusValue(status);
        button.textContent = active ? "Ativo" : "Pendente";
        button.classList.toggle("active", active);
        button.style.backgroundColor = active ? "#51cf66" : "#ff6b6b";
      }

      // Carregar status das aulas do Firestore
      async function loadLessonStatuses(forceRefresh = false) {
        console.log(
          `[loadLessonStatuses] Iniciando carregamento. forceRefresh: ${forceRefresh}`,
        );
        try {
          // Se for o usuário spalenc2@gmail.com, todas as aulas ficam ativas
          if (
            window.userData &&
            window.userData.email === "spalenc2@gmail.com"
          ) {
            const allActiveStatuses = {
              aula1: true,
              aula2: true,
              aula3: true,
              aula4: true,
              aula5: true,
              aula6: true,
              aula7: true,
              aula8: true,
              aula9: true,
              aula10: true,
              aula11: true,
              aula12: true,
              aula13: true,
              aula14: true,
              aula15: true,
              atividades: true,
            };
            localStorage.setItem(
              "lessonStatuses",
              JSON.stringify(allActiveStatuses),
            );
            Object.keys(allActiveStatuses).forEach((lesson) => {
              const button = document.getElementById(`status-${lesson}`);
              if (button) {
                updateStatusButton(button, true);
              }
            });
            console.log(
              "[loadLessonStatuses] Todas as aulas ativadas para o proprietário",
            );
            return;
          }

          const rawStatuses =
            window.userData?.lessonAccess ||
            window.userData?.LessonAccess ||
            {};
          const statuses = Object.keys(rawStatuses).reduce((acc, lesson) => {
            acc[lesson] = normalizeLessonStatusValue(rawStatuses[lesson]);
            return acc;
          }, {});

          if (Object.keys(statuses).length > 0) {
            console.log(
              "Statuses carregados do usuário no Firestore:",
              statuses,
            );
            const normalizedStatuses = statuses;

            localStorage.setItem(
              "lessonStatuses",
              JSON.stringify(normalizedStatuses),
            );
            console.log("Statuses salvos no localStorage");

            let updatedCount = 0;
            Object.keys(normalizedStatuses).forEach((lesson) => {
              const button = document.getElementById(`status-${lesson}`);
              if (button) {
                const oldStatus = button.classList.contains("active");
                updateStatusButton(button, normalizedStatuses[lesson]);
                const newStatus = button.classList.contains("active");
                console.log(
                  `Botão ${lesson}: ${oldStatus ? "Ativo" : "Pendente"} -> ${newStatus ? "Ativo" : "Pendente"}`,
                );
                updatedCount++;
              } else {
                console.log(`Botão status-${lesson} não encontrado`);
              }
            });
            console.log(
              `[loadLessonStatuses] ${updatedCount} botões atualizados com sucesso`,
            );
          } else {
            console.log(
              "Nenhum LessonAccess encontrado no usuário, tentando localStorage",
            );
            const savedStatuses = localStorage.getItem("lessonStatuses");
            if (savedStatuses) {
              const statuses = JSON.parse(savedStatuses);
              console.log("Statuses carregados do localStorage:", statuses);
              Object.keys(statuses).forEach((lesson) => {
                const button = document.getElementById(`status-${lesson}`);
                if (button) {
                  updateStatusButton(button, statuses[lesson]);
                }
              });
            } else {
              console.log("Nenhum status encontrado no localStorage");
            }
          }
        } catch (error) {
          console.error("Erro ao carregar statuses:", error);
          // Em caso de erro, tenta carregar do localStorage
          const savedStatuses = localStorage.getItem("lessonStatuses");
          if (savedStatuses) {
            const statuses = JSON.parse(savedStatuses);
            console.log(
              "Statuses carregados do localStorage (fallback):",
              statuses,
            );
            Object.keys(statuses).forEach((lesson) => {
              const button = document.getElementById(`status-${lesson}`);
              if (button) {
                updateStatusButton(button, statuses[lesson]);
              }
            });
          }
        }
      }

      // Resetar status quando não logado
      function resetLessonStatuses() {
        const buttons = document.querySelectorAll(".status-toggle");
        buttons.forEach((button) => updateStatusButton(button, false));

        // Resetar estado de bloqueio dos botões
        window.lockedButtons = false;
        window.unlockExpiry = null;
        updateLockedButtons();
      }

      // Toggle status da aula
      window.toggleStatus = async function (lesson) {
        console.log(`[toggleStatus] Iniciando toggle para aula: ${lesson}`);

        if (!window.currentUser) {
          console.log("[toggleStatus] Usuário não logado, abortando");
          alert("Você precisa estar logado para alterar o status das aulas.");
          return;
        }

        const button = document.getElementById(`status-${lesson}`);
        if (!button) {
          console.error(
            `[toggleStatus] Botão de status não encontrado para ${lesson}`,
          );
          return;
        }

        const isActive = button.classList.contains("active");
        const newStatus = !isActive;
        console.log(
          `[toggleStatus] ${lesson}: ${isActive ? "Ativo" : "Pendente"} -> ${newStatus ? "Ativo" : "Pendente"}`,
        );

        // Atualiza imediatamente no UI
        updateStatusButton(button, newStatus);
        console.log(`[toggleStatus] Botão atualizado no UI`);

        try {
          console.log(`[toggleStatus] Salvando no Firestore...`);
          const userDocRef = doc(db, "users", window.currentUser.uid);
          const rawStatuses =
            window.userData?.lessonAccess ||
            window.userData?.LessonAccess ||
            {};
          const statuses = { ...rawStatuses, [lesson]: newStatus };

          console.log(`[toggleStatus] Enviando para Firestore:`, statuses);
          await setDoc(
            userDocRef,
            { lessonAccess: statuses, LessonAccess: statuses },
            { merge: true },
          );
          console.log(
            `[toggleStatus] Status ${lesson} salvo com sucesso no Firestore como: ${newStatus}`,
          );

          window.userData = {
            ...window.userData,
            lessonAccess: statuses,
            LessonAccess: statuses,
          };

          // Também atualiza localStorage
          localStorage.setItem("lessonStatuses", JSON.stringify(statuses));
          console.log(`[toggleStatus] Status também salvo no localStorage`);
        } catch (error) {
          console.error("[toggleStatus] Erro ao salvar status:", error);
          updateStatusButton(button, isActive);
          console.log(
            `[toggleStatus] Estado do botão revertido devido ao erro`,
          );
        }
      };

      // Toggle login/logout
      window.toggleAuth = function () {
        if (window.currentUser) {
          signOut(auth).then(() => {
            window.currentUser = null;
            window.lockedButtons = false;
            window.unlockExpiry = null;
            localStorage.removeItem("userLoggedIn");
            localStorage.removeItem("userId");
            // Não precisa chamar loadLessonStatuses aqui, pois onAuthStateChanged vai chamar
            // Adicionando um pequeno delay para garantir que o Firebase tenha tempo de processar
            setTimeout(() => {
              console.log(
                "Logout completado, aguardando atualização automática do status",
              );
            }, 100);
          });
        } else {
          window.location.href = "login.html";
        }
      };

      // Função para alternar tela cheia
      window.toggleFullscreen = function () {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch((err) => {
            console.log("Erro ao tentar entrar em tela cheia:", err);
          });
        } else {
          document.exitFullscreen();
        }
      };

      // Função para ir para a tela inicial
      window.goToHome = function () {
        window.location.href = "index.html";
      };

      // Função para gerenciar alunos (usuários institucionais)
      window.manageStudents = function () {
        window.location.href = "students-management.html";
      };

      // Função para ir ao painel administrativo
      window.goToAdmin = function () {
        window.location.href = "admin-dashboard.html";
      };

      // Função para ir ao painel definido no Firestore
      window.goToDashboard = function () {
        const route = window.dashboardRoute || "";
        if (route) {
          window.location.href = route;
        }
      };

      // Adicionar suporte para tecla F11
      document.addEventListener("keydown", function (e) {
        if (e.key === "F11") {
          e.preventDefault();
          window.toggleFullscreen();
        }
      });
    </script>
    <style>
      /* ================================================= */
      /* ESTILOS CSS                       */
      /* ================================================= */

      :root {
        --cor-verde: #035730;
        /* Cor padrão para cabeçalho e menu */
        --largura-menu: 350px;
        /* Aumentado para acomodar botões extras */
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
        display: flex;

        height: 100vh;
        /* Ocupa a altura total da viewport */
        overflow: hidden;
        /* Evita barras de rolagem desnecessárias no corpo */
      }

      /* Estilos das Seções */
      .header-section {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
      }

        position: fixed;
        top: 60px;

        left: 0;
        width: var(--largura-menu);
        height: calc(100vh - 60px);
        z-index: 999;

      .content-section {
        margin-left: var(--largura-menu);

      }

      .logo-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        gap: 20px;
      }

      .header-buttons {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .header-title {
        flex: 1;
        text-align: center;
        color: #feca57;
        font-weight: bold;
        font-size: 1.1em;

      header h1 {

      /* ------------------ MENU LATERAL ------------------ */
      #menu-lateral {
        width: 100%;
        height: 100%;
        /* Altura restante da tela */
        background-color: var(--cor-verde);
        color: white;
        padding: 0;
        box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }

      #menu-lateral h2 {
        text-align: center;
        margin: 0;
        padding: 20px 10px;
        border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        font-size: 1.3em;
        flex-shrink: 0;
        /* Impede que o título encolha */
        position: sticky;
        top: 0;
        background-color: var(--cor-verde);
        z-index: 10;
      }

      .menu-items-container {
        flex: 1;
        overflow-y: auto;
        /* Apenas os itens rolam */

      /* Estilo personalizado da barra de rolagem */

      .menu-items-container::-webkit-scrollbar-track {

      .menu-items-container::-webkit-scrollbar-thumb {

      .menu-items-container::-webkit-scrollbar-thumb:hover {

    <script>
      function carregarAula(urlDaAula) {
        const iframe = document.getElementById("iframe-aulas");
        const boasVindas = document.getElementById("boas-vindas");

        // Verificar se a aula está ativa
        const lesson = urlDaAula.replace(".html", "");
        const button = document.getElementById(`status-${lesson}`);
        console.log("carregarAula", {
          urlDaAula,
          lesson,
          button,
          currentUser: !!window.currentUser,
        });
        if (button && !button.classList.contains("active")) {
          alert("Esta aula ainda não foi liberada. Contate o administrador.");
          return;
        }

        // 1. Carrega a URL da aula no iframe
        iframe.src = urlDaAula;
        iframe.style.visibility = "visible";
        iframe.style.pointerEvents = "auto";

        // 2. Esconde a tela de boas-vindas
        boasVindas.classList.add("hidden");
      }

      // Função para reinicializar o painel quando volta
      window.resetPainel = function () {
        const iframe = document.getElementById("iframe-aulas");
        const boasVindas = document.getElementById("boas-vindas");

        console.log("Reinicializando painel...");
        iframe.src = "about:blank";
        boasVindas.classList.remove("hidden");

        // Recarregar status das aulas
        loadLessonStatuses();
      };

      // Função extra para garantir que o iframe inicial não tenha conteúdo visível
      window.onload = function () {
        document.getElementById("iframe-aulas").src = "about:blank";

        // Monitorar mudanças no iframe e recarregar status quando voltar
        const iframe = document.getElementById("iframe-aulas");
        let lastSrc = iframe.src;

        setInterval(() => {
          if (iframe.src === "about:blank" && lastSrc !== "about:blank") {
            console.log("Detectado retorno ao painel, recarregando status...");
            loadLessonStatuses();
          }
          lastSrc = iframe.src;
        }, 500);
      };
    </script>
