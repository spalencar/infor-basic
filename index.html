    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

      // Configuração do Firebase (substitua pelas suas credenciais)
      const firebaseConfig = {
        apiKey: "AIzaSyB60LaJaxphLZvb2c0T3t8T9DYTPgTXFL0",
        authDomain: "infor-basic.firebaseapp.com",
        projectId: "infor-basic",
        storageBucket: "infor-basic.firebasestorage.app",
        messagingSenderId: "152738530319",
        appId: "1:152738530319:web:0c9644a18c6e340b2c8f7a",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      window.currentUser = null;
      window.domReady = false;
      window.pendingUser = null;

      function handleAuthStateChanged(user) {
        window.currentUser = user;
        const authButton = document.getElementById("auth-button");
        if (!authButton) return;

        if (user) {
          authButton.textContent = "Logout";
          loadLessonStatuses(user.uid);
        } else {
          authButton.textContent = "Login";
          // Mantém os estados atuais carregados mesmo após logout.
          // Não resetamos para poder visualizar as aulas liberadas.
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        window.domReady = true;
        if (window.pendingUser !== null) {
          handleAuthStateChanged(window.pendingUser);
          window.pendingUser = null;
        }
      });

      onAuthStateChanged(auth, (user) => {
        if (window.domReady) {
          handleAuthStateChanged(user);
        } else {
          window.pendingUser = user;
        }
      });

      function updateStatusButton(button, status) {
        button.textContent = status ? "Ativo" : "Pendente";
        button.classList.toggle("active", status);
        button.style.backgroundColor = status ? "#51cf66" : "#ff6b6b";
      }

      // Carregar status das aulas do Firestore
      async function loadLessonStatuses(userId) {
        try {
          const statusDocRef = doc(db, "config", "aulasStatus");
          const statusDoc = await getDoc(statusDocRef);
          console.log("Documento aulasStatus existe:", statusDoc.exists());
          if (statusDoc.exists()) {
            const statuses = statusDoc.data().lessonStatuses || {};
            console.log("Statuses carregados:", statuses);
            Object.keys(statuses).forEach((lesson) => {
              const button = document.getElementById(`status-${lesson}`);
              if (button) {
                updateStatusButton(button, statuses[lesson]);
                console.log(
                  `Botão ${lesson} atualizado para: ${statuses[lesson] ? "Ativo" : "Pendente"}`,
                );
              } else {
                console.log(`Botão status-${lesson} não encontrado`);
              }
            });
          } else {
            console.log("Documento aulasStatus não existe");
          }
        } catch (error) {
          console.error("Erro ao carregar statuses:", error);
        }
      }

      // Resetar status quando não logado
      function resetLessonStatuses() {
        const buttons = document.querySelectorAll(".status-toggle");
        buttons.forEach((button) => updateStatusButton(button, false));
      }

      // Toggle status da aula
      window.toggleStatus = async function (lesson) {
        if (!window.currentUser) {
          alert("Você precisa estar logado para alterar o status das aulas.");
          return;
        }

        const button = document.getElementById(`status-${lesson}`);
        if (!button) {
          console.error("Botão de status não encontrado para", lesson);
          return;
        }

        const isActive = button.classList.contains("active");
        const newStatus = !isActive;
        updateStatusButton(button, newStatus);

        // Salvar no Firestore no documento permitido pelas regras
        try {
          const statusDocRef = doc(db, "config", "aulasStatus");
          const statusDoc = await getDoc(statusDocRef);
          const statuses = statusDoc.exists()
            ? statusDoc.data().lessonStatuses || {}
            : {};
          statuses[lesson] = newStatus;
          await setDoc(
            statusDocRef,
            { lessonStatuses: statuses },
            { merge: true },
          );
          console.log(`Status ${lesson} salvo como: ${newStatus}`);
        } catch (error) {
          console.error("Erro ao salvar status:", error);
        }
      };

      // Toggle login/logout
      window.toggleAuth = function () {
        if (window.currentUser) {
          signOut(auth).then(() => {
            window.currentUser = null;
            localStorage.removeItem("userLoggedIn");
            localStorage.removeItem("userId");
          });
        } else {
          window.location.href = "login.html";
        }
      };
    </script>

      }

      }

      .menu-item {

        width: 100%;

      .menu-botao {
        flex: 1;
        padding: 10px 15px;
        text-align: left;
        border: none;
        background-color: transparent;
        color: white;
        font-size: 1em;

        transition:
          background-color 0.2s,

      }

      .status-toggle {
        width: 80px;
        padding: 5px 10px;
        margin-left: 10px;
        background-color: #ff6b6b;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.8em;
        transition: background-color 0.2s;
      }

      .menu-botao:hover {

      }

      .menu-botao:active {

      }

      /* ------------------ CONTEÚDO PRINCIPAL ------------------ */
      #conteudo-principal {
        margin-left: var(--largura-menu); /* Espaço para o menu */

        height: calc(100vh - 60px);

      /* ------------------ TELA DE BOAS-VINDAS ------------------ */

        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        text-align: center;
        z-index: 50; /* Fica acima do iframe quando visível */

      }

      #boas-vindas.hidden {
        opacity: 0;
        pointer-events: none; /* Permite clicar no iframe por baixo */
        z-index: 1;
      }

      #boas-vindas-texto {

        border: none;
        background-color: white; /* Cor de fundo padrão para as páginas de aula */
      }

    <script>
      function carregarAula(urlDaAula) {
        const iframe = document.getElementById("iframe-aulas");
        const boasVindas = document.getElementById("boas-vindas");

        // Verificar se a aula está ativa
        const lesson = urlDaAula.replace(".html", "");
        const button = document.getElementById(`status-${lesson}`);
        console.log("carregarAula", {
          urlDaAula,
          lesson,
          button,
          currentUser: !!window.currentUser,
        });
        if (button && !button.classList.contains("active")) {
          alert("Esta aula ainda não foi liberada. Contate o administrador.");
          return;
        }

        // 1. Carrega a URL da aula no iframe
        iframe.src = urlDaAula;
        iframe.style.visibility = "visible";
        iframe.style.pointerEvents = "auto";

        // 2. Esconde a tela de boas-vindas
        boasVindas.classList.add("hidden");
      }

      // Função para reinicializar o painel quando volta
      window.resetPainel = function () {
        const iframe = document.getElementById("iframe-aulas");
        const boasVindas = document.getElementById("boas-vindas");

        console.log("Reinicializando painel...");
        iframe.src = "about:blank";
        boasVindas.classList.remove("hidden");

        // Recarregar status das aulas
        if (window.currentUser) {
          loadLessonStatuses(window.currentUser.uid);
        }
      };

      // Função extra para garantir que o iframe inicial não tenha conteúdo visível
      window.onload = function () {
        document.getElementById("iframe-aulas").src = "about:blank";

        // Monitorar mudanças no iframe e recarregar status quando voltar
        const iframe = document.getElementById("iframe-aulas");
        let lastSrc = iframe.src;

        setInterval(() => {
          if (iframe.src === "about:blank" && lastSrc !== "about:blank") {
            console.log("Detectado retorno ao painel, recarregando status...");
            if (window.currentUser) {
              loadLessonStatuses(window.currentUser.uid);
            }
          }
          lastSrc = iframe.src;
        }, 500);
      };
    </script>
