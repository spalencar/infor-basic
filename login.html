<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Midi@tiva Educa+</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        color: #e2e8f0;
        padding: 20px;
      }

      .login-container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .logo {
        width: 60px;
        height: 60px;
        background: linear-gradient(45deg, #ff6b6b, #feca57);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        color: white;
        margin: 0 auto 20px;
      }

      .login-container h2 {
        margin-bottom: 30px;
        color: #feca57;
        font-size: 2em;
      }

      .form-group {
        margin-bottom: 15px;
        text-align: left;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #cbd5e1;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #334155;
        border-radius: 10px;
        box-sizing: border-box;
        background-color: #1e293b;
        color: #e2e8f0;
      }

      .form-group input::placeholder {
        color: #94a3b8;
      }

      .login-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(45deg, #ff6b6b, #feca57);
        color: black;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: all 0.3s ease;
        margin-bottom: 15px;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
      }

      .register-link {
        margin-top: 20px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .register-link p {
        margin: 0 0 10px 0;
        color: #94a3b8;
        font-size: 0.9em;
      }

      .register-link a {
        color: #feca57;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      .register-link a:hover {
        color: #ff6b6b;
        text-decoration: underline;
      }

      .error-message {
        color: #f87171;
        margin-top: 10px;
        display: none;
      }

      .back-btn {
        margin-top: 20px;
        background-color: transparent;
        color: #38bdf8;
        border: 1px solid #38bdf8;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
      }

      .back-btn:hover {
        background-color: rgba(56, 189, 248, 0.1);
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <div class="logo">M+</div>
      <h2>Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="email">E-mail:</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label for="password">Senha:</label>
          <input type="password" id="password" required />
        </div>
        <button type="submit" class="login-btn">Entrar</button>
      </form>
      <div id="error-message" class="error-message"></div>
      <div class="register-link">
        <p>Não tem uma conta?</p>
        <a href="cadastro.html">Criar conta gratuita</a>
      </div>
      <button class="back-btn" onclick="window.location.href = 'index.html'">
        Voltar
      </button>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

      // Configuração do Firebase (substitua pelas suas credenciais)
      const firebaseConfig = {
        apiKey: "AIzaSyB60LaJaxphLZvb2c0T3t8T9DYTPgTXFL0",
        authDomain: "infor-basic.firebaseapp.com",
        projectId: "infor-basic",
        storageBucket: "infor-basic.firebasestorage.app",
        messagingSenderId: "152738530319",
        appId: "1:152738530319:web:0c9644a18c6e340b2c8f7a",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          try {
            const userCredential = await signInWithEmailAndPassword(
              auth,
              email,
              password,
            );
            const userDoc = await getDoc(
              doc(db, "users", userCredential.user.uid),
            );
            const userData = userDoc.exists() ? userDoc.data() : null;

            // Login bem-sucedido
            localStorage.setItem("userLoggedIn", "true");
            localStorage.setItem("userId", userCredential.user.uid);
            localStorage.setItem("userType", userData?.userType || "");
            localStorage.setItem("userName", userData?.name || "");

            window.location.href = "home.html";
          } catch (error) {
            document.getElementById("error-message").textContent =
              "Erro no login: " + error.message;
            document.getElementById("error-message").style.display = "block";
          }
        });
    </script>
  </body>
</html>
