<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Midi@tiva Educa+</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        color: #e2e8f0;
        padding: 20px;
      }

      .register-container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 450px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .register-container h2 {
        margin-bottom: 30px;
        color: #feca57;
        font-size: 2em;
      }

      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #cbd5e1;
        font-weight: 500;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 10px;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
        font-size: 16px;
      }

      .form-group input::placeholder {
        color: #94a3b8;
      }

      .form-group select {
        cursor: pointer;
      }

      .form-group select option {
        background: #1a1a1a;
        color: #e2e8f0;
      }

      .user-type-info {
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 0.9em;
        line-height: 1.4;
        border-left: 3px solid #feca57;
      }

      .register-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(45deg, #ff6b6b, #feca57);
        color: black;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .register-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
      }

      .register-btn:disabled {
        background: #6b7280;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .error-message {
        color: #f87171;
        margin-top: 15px;
        display: none;
        padding: 10px;
        background: rgba(248, 113, 113, 0.1);
        border-radius: 8px;
        border: 1px solid rgba(248, 113, 113, 0.3);
      }

      .success-message {
        color: #51cf66;
        margin-top: 15px;
        display: none;
        padding: 10px;
        background: rgba(81, 207, 102, 0.1);
        border-radius: 8px;
        border: 1px solid rgba(81, 207, 102, 0.3);
      }

      .back-btn {
        margin-top: 20px;
        background: transparent;
        color: #38bdf8;
        border: 1px solid #38bdf8;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
      }

      .back-btn:hover {
        background: rgba(56, 189, 248, 0.1);
        transform: translateX(-5px);
      }

      .password-requirements {
        font-size: 0.85em;
        color: #94a3b8;
        margin-top: 5px;
        line-height: 1.3;
      }

      .logo {
        width: 60px;
        height: 60px;
        background: linear-gradient(45deg, #ff6b6b, #feca57);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        color: white;
        margin: 0 auto 20px;
      }

      @media (max-width: 480px) {
        .register-container {
          padding: 30px 20px;
        }

        .register-container h2 {
          font-size: 1.5em;
        }
      }
    </style>
  </head>

  <body>
    <div class="register-container">
      <div class="logo">M+</div>
      <h2>Criar Conta</h2>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Nome Completo:</label>
          <input
            type="text"
            id="name"
            required
            placeholder="Seu nome completo"
          />
        </div>

        <div class="form-group">
          <label for="email">E-mail:</label>
          <input type="email" id="email" required placeholder="seu@email.com" />
        </div>

        <div class="form-group">
          <label for="userType">Tipo de Conta:</label>
          <select id="userType" required onchange="updateUserInfo()">
            <option value="">Selecione um tipo</option>
            <option value="pessoal">Pessoal</option>
            <option value="institucional">Institucional</option>
            <option value="admin">Administrador</option>
          </select>
        </div>

        <div id="userTypeInfo" class="user-type-info" style="display: none">
          <!-- Informações sobre o tipo de usuário serão inseridas aqui -->
        </div>

        <div class="form-group">
          <label for="password">Senha:</label>
          <input
            type="password"
            id="password"
            required
            placeholder="Mínimo 6 caracteres"
            minlength="6"
          />
          <div class="password-requirements">
            • Mínimo 6 caracteres<br />
            • Recomendado: letras, números e símbolos
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Senha:</label>
          <input
            type="password"
            id="confirmPassword"
            required
            placeholder="Digite a senha novamente"
          />
        </div>

        <button type="submit" class="register-btn" id="registerBtn">
          Criar Conta
        </button>
      </form>

      <div id="error-message" class="error-message"></div>
      <div id="success-message" class="success-message"></div>

      <a href="index.html" class="back-btn"> ← Voltar para Página Inicial </a>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        getDoc,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

      // Configuração do Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyB60LaJaxphLZvb2c0T3t8T9DYTPgTXFL0",
        authDomain: "infor-basic.firebaseapp.com",
        projectId: "infor-basic",
        storageBucket: "infor-basic.firebasestorage.app",
        messagingSenderId: "152738530319",
        appId: "1:152738530319:web:0c9644a18c6e340b2c8f7a",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // Verificar se usuário logado é admin para mostrar opção de criar admin
      onAuthStateChanged(auth, async (user) => {
        const userTypeSelect = document.getElementById("userType");
        const adminOption = userTypeSelect.querySelector(
          'option[value="admin"]',
        );

        if (user) {
          try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists() && userDoc.data().userType === "admin") {
              // Usuário logado é admin, mostrar opção admin
              if (!adminOption) {
                const option = document.createElement("option");
                option.value = "admin";
                option.textContent = "Administrador";
                userTypeSelect.appendChild(option);
              }
            } else {
              // Não é admin, remover opção se existir
              if (adminOption) {
                adminOption.remove();
              }
            }
          } catch (error) {
            console.error("Erro ao verificar tipo de usuário:", error);
            if (adminOption) {
              adminOption.remove();
            }
          }
        } else {
          // Não logado, remover opção admin
          if (adminOption) {
            adminOption.remove();
          }
        }
      });

      // Função para atualizar informações do tipo de usuário
      window.updateUserInfo = function () {
        const userType = document.getElementById("userType").value;
        const infoDiv = document.getElementById("userTypeInfo");

        if (userType === "pessoal") {
          infoDiv.innerHTML = `
          <strong>Plano Pessoal:</strong><br>
          • Acesso imediato a todas as aulas<br>
          • Liberação automática de conteúdo<br>
          • Certificado pessoal ao concluir<br>
          • R$ 67,00 (pagamento único)
        `;
          infoDiv.style.display = "block";
        } else if (userType === "institucional") {
          infoDiv.innerHTML = `
          <strong>Plano Institucional:</strong><br>
          • Controle total sobre liberação de aulas<br>
          • Gerenciamento de alunos ilimitado<br>
          • Painel administrativo exclusivo<br>
          • R$ 497,00 (pagamento único)
        `;
          infoDiv.style.display = "block";
        } else if (userType === "admin") {
          infoDiv.innerHTML = `
          <strong>Acesso Administrativo:</strong><br>
          • Gestão completa de todos os usuários<br>
          • Controle total do sistema<br>
          • Relatórios e estatísticas<br>
          • Apenas para proprietários
        `;
          infoDiv.style.display = "block";
        } else {
          infoDiv.style.display = "none";
        }
      };

      // Validação de senhas
      function validatePasswords() {
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (password !== confirmPassword) {
          showError("As senhas não coincidem.");
          return false;
        }

        if (password.length < 6) {
          showError("A senha deve ter pelo menos 6 caracteres.");
          return false;
        }

        return true;
      }

      function showError(message) {
        const errorDiv = document.getElementById("error-message");
        errorDiv.textContent = message;
        errorDiv.style.display = "block";
        document.getElementById("success-message").style.display = "none";
      }

      function showSuccess(message) {
        const successDiv = document.getElementById("success-message");
        successDiv.textContent = message;
        successDiv.style.display = "block";
        document.getElementById("error-message").style.display = "none";
      }

      document
        .getElementById("register-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          if (!validatePasswords()) {
            return;
          }

          const registerBtn = document.getElementById("registerBtn");
          registerBtn.disabled = true;
          registerBtn.textContent = "Criando conta...";

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const userType = document.getElementById("userType").value;

          try {
            // Criar usuário no Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(
              auth,
              email,
              password,
            );
            const user = userCredential.user;

            // Salvar informações adicionais no Firestore
            await setDoc(doc(db, "users", user.uid), {
              name: name,
              email: email,
              userType: userType,
              isAdmin: userType === "admin",
              unlockPassword: password, // Salvar senha para desbloqueio
              createdAt: serverTimestamp(),
              status: "active",
              planStatus: userType === "pessoal" ? "active" : "pending",
              // Para usuários institucionais, todas as aulas começam bloqueadas
              lessonAccess:
                userType === "pessoal"
                  ? {
                      aula1: true,
                      aula2: true,
                      aula3: true,
                      aula4: true,
                      aula5: true,
                      aula6: true,
                      aula7: true,
                      aula8: true,
                      aula9: true,
                      aula10: true,
                      aula11: true,
                      aula12: true,
                      aula13: true,
                      aula14: true,
                      aula15: true,
                      atividades: true,
                    }
                  : {
                      aula1: false,
                      aula2: false,
                      aula3: false,
                      aula4: false,
                      aula5: false,
                      aula6: false,
                      aula7: false,
                      aula8: false,
                      aula9: false,
                      aula10: false,
                      aula11: false,
                      aula12: false,
                      aula13: false,
                      aula14: false,
                      aula15: false,
                      atividades: false,
                    },
              // Para usuários institucionais, lista de alunos (vazia inicialmente)
              students: userType === "institucional" ? [] : null,
            });

            showSuccess(
              "Conta criada com sucesso! Redirecionando para o painel...",
            );

            // Salvar informações localmente
            localStorage.setItem("userLoggedIn", "true");
            localStorage.setItem("userId", user.uid);
            localStorage.setItem("userType", userType);
            localStorage.setItem("userName", name);

            // Redirecionar após 2 segundos
            setTimeout(() => {
              window.location.href = "home.html";
            }, 2000);
          } catch (error) {
            console.error("Erro no cadastro:", error);

            let errorMessage = "Erro ao criar conta. ";

            switch (error.code) {
              case "auth/email-already-in-use":
                errorMessage += "Este e-mail já está em uso.";
                break;
              case "auth/weak-password":
                errorMessage += "A senha é muito fraca.";
                break;
              case "auth/invalid-email":
                errorMessage += "E-mail inválido.";
                break;
              default:
                errorMessage += error.message;
            }

            showError(errorMessage);
            registerBtn.disabled = false;
            registerBtn.textContent = "Criar Conta";
          }
        });

      // Validação em tempo real das senhas
      document
        .getElementById("confirmPassword")
        .addEventListener("input", () => {
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          if (confirmPassword && password !== confirmPassword) {
            showError("As senhas não coincidem.");
          } else {
            document.getElementById("error-message").style.display = "none";
          }
        });
    </script>
  </body>
</html>
